# Exemplo de site Nginx (VPS Hostinger) como reverse proxy para o Next.js.
# Copie para /etc/nginx/sites-available/ e ajuste server_name, caminhos e certificados.
# Depois: sudo ln -s ... sites-enabled && sudo nginx -t && sudo systemctl reload nginx

upstream alma_next {
    server 127.0.0.1:3000;
    keepalive 64;
}

server {
    listen 80;
    listen [::]:80;
    server_name seu-dominio.com.br www.seu-dominio.com.br;

    # Redirecionar HTTP → HTTPS após configurar SSL (Certbot costuma inserir o bloco 443)
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name seu-dominio.com.br www.seu-dominio.com.br;

    # ssl_certificate /etc/letsencrypt/live/seu-dominio.com.br/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/seu-dominio.com.br/privkey.pem;

    client_max_body_size 12M;

    location / {
        proxy_pass http://alma_next;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        # Obrigatório para cookies Secure do admin em produção (HTTPS atrás do proxy)
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 60s;
    }
}
